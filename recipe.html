<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Atlas - Recipe</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="detail">
    <header class="site-header">
      <a class="brand" href="index.html">Recipe Atlas</a>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="recipes.html">All Recipes</a>
        <a href="add-recipe.html">Add Recipe</a>
      </nav>
    </header>

    <main class="container">
      <section class="panel">
        <div class="section-head">
          <h1 id="recipeName">Recipe</h1>
          <span id="recipeCategoryTag" class="tag"></span>
        </div>
        <div class="recipe-hero">
          <img id="recipeImageView" class="recipe-image" alt="Recipe image" />
          <div class="recipe-meta">
            <p id="timeLine" class="hint">Prep Time - | Total Time -</p>
            <p id="servingsLine" class="hint">Servings -</p>
            <p id="sourceLine" class="hint"></p>
          </div>
        </div>
        <div class="toolbar">
          <label class="inline-label" for="servingsRange">Servings Scale</label>
          <input id="servingsRange" type="range" min="1" max="32" value="8" />
          <span id="servingsValue" class="tag">8</span>
          <label class="inline-label" for="unitView">Ingredients Units</label>
          <select id="unitView">
            <option value="metric">g / ml</option>
            <option value="original">cups / spoons</option>
          </select>
          <button class="btn btn-secondary" id="cookModeBtn" type="button">Cook Mode</button>
          <button class="btn btn-secondary" id="printBtn" type="button">Print Card</button>
          <button class="btn btn-secondary" id="editRecipeBtn" type="button">Edit</button>
          <button class="btn btn-secondary" id="snapshotBtn" type="button">Save Snapshot</button>
        </div>
        <p id="scaleHint" class="hint"></p>

        <div class="detail-grid">
          <article class="subpanel">
            <h2>Ingredients</h2>
            <div id="ingredientList"></div>
          </article>
          <article class="subpanel">
            <h2>Instructions</h2>
            <div id="stepList"></div>
          </article>
        </div>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>Notes</h2>
        </div>
        <ol id="notesList" class="list"></ol>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>Substitute Assistant</h2>
        </div>
        <div class="toolbar">
          <select id="subIngredient"></select>
          <button id="subSuggestBtn" class="btn btn-secondary" type="button">Suggest Swap</button>
        </div>
        <div id="subResult" class="review-list"></div>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>Version Snapshots</h2>
        </div>
        <div id="snapshotList" class="review-list"></div>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>Comments and Results</h2>
        </div>
        <div class="comment-form">
          <label for="reviewText">Review</label>
          <textarea id="reviewText" rows="4" placeholder="How did it turn out?"></textarea>
          <div class="toolbar">
            <label class="inline-label" for="reviewRating">Rating</label>
            <select id="reviewRating">
              <option value="5">5</option>
              <option value="4">4</option>
              <option value="3">3</option>
              <option value="2">2</option>
              <option value="1">1</option>
            </select>
            <input id="reviewImage" type="file" accept="image/*" />
            <button id="saveReviewBtn" class="btn btn-primary" type="button">Post Review</button>
          </div>
        </div>
        <div id="reviewList" class="review-list"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
